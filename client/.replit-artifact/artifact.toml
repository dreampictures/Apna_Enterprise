kind = "web"
previewPath = "/"
title = "Global Enterprise"
version = "1.0.0"
id = "artifacts/global-enterprise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22654

[services.development]
run = "pnpm --filter @workspace/global-enterprise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/global-enterprise", "run", "build" ]
publicDir = "artifacts/global-enterprise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22654"
BASE_PATH = "/"
